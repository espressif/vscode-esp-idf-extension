name: UI Test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  ui_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Yarn dependencies
        run: |
          yarn
          yarn install

      - name: Run End to End tests script with xvfb
        run: xvfb-run --auto-servernum yarn ci-test

      - name: Print UI Test Results
        run: |
          echo "=== UI Test Results ==="
          if [ -f "./reports/ui-test-results.json" ]; then
            echo "UI Test Results:"
            cat ./reports/ui-test-results.json | jq '.' || echo "Could not parse UI test results"
          else
            echo "No UI test results file found"
            echo "Checking for other test output files:"
            find . -name "*test*results*" -o -name "*ui-test-results.json*" | head -10
          fi

      - name: Publish UI Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: UI Tests
          path: ./reports/ui-test-results.json
          reporter: mocha-json

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: |
            ./reports/ui-test-results.json
            ./test-resources/screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ./test-resources/screenshots

  ui_hardware_test:
    runs-on: [self-hosted, BrnoUBU0004]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.4"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Yarn dependencies
        run: |
          yarn
          yarn install

      - name: Run hardware UI tests
        run: yarn ci-test-hardware

      - name: Print UI Hardware Test Results
        if: always()
        run: |
          echo "=== UI Hardware Test Results ==="
          if [ -f "./reports/ui-test-hardware-results.json" ]; then
            echo "UI Hardware Test Results:"
            cat ./reports/ui-test-hardware-results.json | jq '.' || echo "Could not parse UI hardware test results"
          else
            echo "No UI hardware test results file found"
            find . -name "*hardware*results*" | head -10
          fi

      - name: Publish UI Hardware Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: UI Hardware Tests
          path: ./reports/ui-test-hardware-results.json
          reporter: mocha-json

      - name: Upload UI hardware test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-hardware-test-results
          path: |
            ./reports/ui-test-hardware-results.json
            ./test-resources/screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-hardware-test-screenshots
          path: ./test-resources/screenshots
