name: UI Test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  ui_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.4.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn dependencies
        run: |
          yarn
          yarn install

      - name: Run End to End tests script with xvfb
        run: xvfb-run --auto-servernum yarn ci-test

      - name: Print UI Test Results
        run: |
          echo "=== UI Test Results ==="
          if [ -f "./reports/ui-test-results.json" ]; then
            echo "UI Test Results:"
            cat ./reports/ui-test-results.json | jq '.' || echo "Could not parse UI test results"
          else
            echo "No UI test results file found"
            echo "Checking for other test output files:"
            find . -name "*test*results*" -o -name "*ui-test-results.json*" | head -10
          fi

      - name: Publish UI Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: UI Tests
          path: ./reports/ui-test-results.json
          reporter: mocha-json

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: |
            ./reports/ui-test-results.json
            ./test-resources/screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with: 
          name: screenshots
          path: ./test-resources/screenshots
