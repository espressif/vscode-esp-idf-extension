name: CI

on: [push, pull_request]

jobs:
  extension_ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [12.x]

    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
        with:
          submodules: "recursive"

      - name: Clone ESP-IDF
        uses: actions/checkout@v2
        env:
          IDF_PATH: env.GITHUB_WORKSPACE/esp/idf
          IDF_TOOLS_PATH: env.GITHUB_WORKSPACE/esp
        with:
          repository: espressif/esp-idf
          path: esp/idf

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v1
        with:
          python-version: 3.6

      - name: Install Node Dependencies
        run: yarn

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r esp_debug_adapter/requirements.txt

      - name: Lint Check
        run: yarn lint

      - name: Package open .vsix
        run: yarn packageWithoutDependencies

      - name: Upload no dependencies .vsix File
        uses: actions/upload-artifact@v1
        with:
          name: esp-idf-extension-open.vsix
          path: esp-idf-extension-open.vsix

      - name: Package .vsix
        run: yarn package

      - name: Upload .vsix File
        uses: actions/upload-artifact@v1
        with:
          name: esp-idf-extension.vsix
          path: esp-idf-extension.vsix

      - name: Setting up ESP-IDF Tools
        env:
          IDF_PATH: /opt/esp/idf
          IDF_TOOLS_PATH: /opt/esp
        run: |
          $IDF_PATH/tools/idf_tools.py --non-interactive install required
          $IDF_PATH/tools/idf_tools.py --non-interactive install cmake
          $IDF_PATH/tools/idf_tools.py --non-interactive install-python-env
          rm -rf env.IDF_TOOLS_PATH/dist

      - name: Extension Test
        uses: GabrielBB/xvfb-action@v1.2
        with:
          run: yarn test >> testing.results.log

      - name: Upload testing.results.log
        uses: actions/upload-artifact@v1
        with:
          name: testing.results.log
          path: testing.results.log

  extension_test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
        with:
          submodules: "recursive"

      - name: Run test
        uses: ./.github/actions/idf
